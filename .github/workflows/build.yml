name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # リリース作成に必要

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ClipFinder-Windows.zip
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          - os: ubuntu-latest
            artifact_name: ClipFinder-Linux.tar.gz
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 faster-whisper ffmpeg-python python-dotenv
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "${{ matrix.ffmpeg_url }}" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          New-Item -ItemType Directory -Force -Path "ffmpeg"
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "ffmpeg/"
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" -Destination "ffmpeg/"
        shell: pwsh

      - name: Download FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "${{ matrix.ffmpeg_url }}" -O ffmpeg.tar.xz
          mkdir -p ffmpeg_temp
          tar -xf ffmpeg.tar.xz -C ffmpeg_temp
          mkdir -p ffmpeg
          cp ffmpeg_temp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg ffmpeg/
          cp ffmpeg_temp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe ffmpeg/
          chmod +x ffmpeg/ffmpeg ffmpeg/ffprobe

      - name: Create .env file
        run: |
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > .env
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean clipfinder.spec

      - name: Create distribution archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "dist/ClipFinder/*" -DestinationPath "ClipFinder-Windows.zip"
        shell: pwsh

      - name: Create distribution archive (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czvf ClipFinder-Linux.tar.gz -C dist ClipFinder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os == 'Windows' && 'ClipFinder-Windows' || 'ClipFinder-Linux' }}
          path: ${{ matrix.artifact_name }}

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
