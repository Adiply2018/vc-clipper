name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手動実行も可能

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 faster-whisper ffmpeg-python
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          New-Item -ItemType Directory -Force -Path "ffmpeg"
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "ffmpeg/"
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" -Destination "ffmpeg/"
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean clipfinder.spec

      - name: Create distribution zip
        run: |
          Compress-Archive -Path "dist/ClipFinder/*" -DestinationPath "ClipFinder-Windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipFinder-Windows
          path: ClipFinder-Windows.zip

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ClipFinder-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
